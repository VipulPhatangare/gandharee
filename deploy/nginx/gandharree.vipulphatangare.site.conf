server {
    listen 80;
    server_name gandharree.vipulphatangare.site;

    root /var/www/gandharree/frontend/dist;
    index index.html;

    client_max_body_size 25m;

    # Frontend SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy (Node on port 7117)
    location /api/ {
        proxy_pass http://127.0.0.1:7117/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Uploaded assets proxy
    location /uploads/ {
        proxy_pass http://127.0.0.1:7117/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/gandharree.access.log;
    error_log /var/log/nginx/gandharree.error.log;
}
